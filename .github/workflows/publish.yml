name: Publish nono package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish package
        uses: always-further/agent-sign@v0.0.8
        with:
          publish: "true"
          package-name: claude-code
          package-namespace: lukehinds
          package-version: ${{ github.ref_name }}
          nono-version: latest
          package-path: .
          registry-url: https://gkz3vwvp1zx8.share.zrok.io/api/v1
          files: |
            package.json
            claude-code.profile.json
            CLAUDE.md
            hooks/nono-hook.sh
            groups.json
            trust-policy.json
