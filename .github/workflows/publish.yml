name: Publish nono package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish package
        uses: always-further/agent-sign@1d659b312c441803412a0acdfbf606d5588049e6 # v0.0.4
        with:
          package-name: claude-code
          package-namespace: always-further
          package-version: ${{ github.ref_name }}
          nono-version: latest
          package-path: .
          registry-url: https://far416w50qhc.share.zrok.io/api/v1
          files: |
            package.json
            claude-code.profile.json
            CLAUDE.md
            hooks/nono-hook.sh
            groups.json
            trust-policy.json
